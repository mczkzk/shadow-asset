<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DB8FF" />
      <stop offset="100%" stop-color="#0B63F6" />
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="96" />
    </clipPath>
    <mask id="circleCutout" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse" x="0" y="0" width="512" height="512">
      <rect width="512" height="512" fill="black" />
      <circle cx="256" cy="256" r="150" fill="white" />
      <path
        d="M 382 152
           L 234 174
           L 306 248
           L 180 248
           L 252 338"
        fill="none"
        stroke="black"
        stroke-width="42"
        stroke-linecap="round"
        stroke-linejoin="round"
        transform="rotate(-12 256 256)"
      />
    </mask>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="512" height="512" fill="url(#bg)" />
    <polygon points="170,0 512,0 512,342" fill="#67D8FF" opacity="0.24" />
    <polygon points="0,170 342,512 0,512" fill="#0847C7" opacity="0.24" />

    <g transform="translate(256 256) scale(1.2) translate(-256 -256)">
      <rect width="512" height="512" fill="#FFFFFF" mask="url(#circleCutout)" />
      <circle cx="389" cy="101" r="28" fill="#FFFFFF" />
